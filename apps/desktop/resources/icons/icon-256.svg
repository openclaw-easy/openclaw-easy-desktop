<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #2f3136; }
      .border { stroke: #5865F2; stroke-width: 4; fill: none; }
      .lobster {
        font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Helvetica", sans-serif;
        font-size: 153.6px;
        text-anchor: middle;
        dominant-baseline: central;
        fill: white;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="256" height="256" rx="25.6" class="bg"/>

  <!-- Border -->
  <rect x="4" y="4" width="248" height="248" rx="25.6" class="border"/>

  <!-- Lobster emoji -->
  <text x="128" y="128" class="lobster">🦞</text>
</svg>