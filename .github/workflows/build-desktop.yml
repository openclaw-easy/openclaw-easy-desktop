name: Build Desktop App

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: 'Create release'
        required: false
        type: boolean
        default: false

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build app
        working-directory: ./apps/desktop
        run: pnpm build

      - name: Package for macOS
        working-directory: ./apps/desktop
        run: npx electron-builder --mac dmg --arm64 --x64 --publish never --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-installer
          path: apps/desktop/dist-installers/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build app
        working-directory: ./apps/desktop
        run: pnpm build

      - name: Package for Windows
        working-directory: ./apps/desktop
        run: npx electron-builder --win --publish never --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: apps/desktop/dist-installers/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libx11-dev libxkbfile-dev

      - name: Install dependencies
        run: pnpm install

      - name: Build app
        working-directory: ./apps/desktop
        run: pnpm build

      - name: Package for Linux
        working-directory: ./apps/desktop
        run: npx electron-builder --linux --publish never --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-installer
          path: apps/desktop/dist-installers/*.AppImage
