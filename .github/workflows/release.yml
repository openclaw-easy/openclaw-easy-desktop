name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build desktop app
        working-directory: ./apps/desktop
        run: pnpm build

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: ./apps/desktop
        run: npx electron-builder --win --publish never --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: ./apps/desktop
        run: npx electron-builder --mac dmg --arm64 --x64 --publish never --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: ./apps/desktop
        run: npx electron-builder --linux --publish never --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.os }}
          path: |
            apps/desktop/dist-installers/*.dmg
            apps/desktop/dist-installers/*.exe
            apps/desktop/dist-installers/*.AppImage
